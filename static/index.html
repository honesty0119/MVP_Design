<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>市场线索流转台</title>
  <style>
    :root{--ink:#162033;--muted:#667085;--line:#e6eaf0;--blue:#315efb;--bg:#f5f7fb;--red:#c92a2a;--green:#14804a}
    *{box-sizing:border-box}body{margin:0;font:14px/1.5 system-ui,"Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg)}
    header{padding:22px 30px;background:#121b31;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:16px}header h1{font-size:22px;margin:0}header small{color:#aeb8ce}header select{padding:5px 8px;border-color:#5b6680;background:#18243d;color:#fff}
    main{max-width:1280px;margin:0 auto;padding:22px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.card,.panel{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 2px 10px #1620330a}.card{padding:16px}.card b{display:block;font-size:25px;margin-top:5px}.card span{color:var(--muted)}.card.clickable{cursor:pointer}.card.clickable:hover{border-color:#9db0ff}
    .panel{margin-top:16px;padding:16px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar h2{margin:0 auto 0 0;font-size:18px}
    input,select,button,textarea{font:inherit;border:1px solid #cfd6e1;border-radius:7px;padding:8px 10px;background:#fff}button{cursor:pointer}button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
    table{width:100%;border-collapse:collapse;margin-top:12px}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-size:12px}tr:hover{background:#fafbfe}.status{font-size:12px;padding:3px 7px;border-radius:10px;background:#edf2ff;color:#2949c7}.overdue{color:var(--red);font-weight:600}
    dialog{border:0;border-radius:12px;box-shadow:0 20px 60px #0003;width:min(760px,92vw);padding:0}dialog::backdrop{background:#17203a99}.modal{padding:20px}.modal h3{margin-top:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.timeline{border-left:2px solid var(--line);padding-left:14px}.item{margin:9px 0}.muted{color:var(--muted)}.error{color:var(--red);white-space:pre-wrap}.funnel{display:flex;gap:6px;align-items:center;overflow:auto;margin-top:12px}.stage{background:#f0f3ff;color:#2949c7;border-radius:8px;padding:8px 11px;white-space:nowrap}.arrow{color:#98a2b3}.hint{font-size:12px;color:var(--muted);margin:6px 0}.filebox{border:1px dashed #aeb8c8;border-radius:8px;padding:12px;background:#fafbfc}.scorebox,.tracebox{border:1px solid var(--line);border-radius:10px;padding:12px;background:#fafcff;margin:10px 0}.score{font-size:24px;font-weight:700;color:var(--blue)}.ok{color:var(--green);font-weight:600}.bad{color:var(--red);font-weight:600}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.chip{font-size:12px;border-radius:999px;padding:3px 8px;background:#eef2ff;color:#2949c7}.tracebox ol{margin:6px 0 0 18px;padding:0}.tracebox li{margin:4px 0}@media(max-width:800px){.cards{grid-template-columns:1fr 1fr}.hide-sm{display:none}.grid{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
<header><div><h1>市场线索流转台</h1><small>从线索进入到 MQL / SQL 的可追溯闭环</small></div><div>演示环境 · 全部为模拟数据 · 当前操作人 <select id="actor"></select></div></header>
<main>
  <section class="cards" id="cards"></section>
  <section class="panel">
    <div class="toolbar">
      <h2>线索分析 Agent</h2>
      <input id="question" style="min-width:320px" value="本周哪个渠道 SQL 转化率最高？" aria-label="业务问题">
      <button class="primary" onclick="askQuestion()">查询</button>
    </div>
    <div id="answer" class="hint">配置 LLM 后由模型选择受控数据工具；未配置密钥时自动使用规则回退。不会执行任意 SQL。</div>
  </section>
  <section class="panel">
    <div class="toolbar">
      <h2>线索列表</h2>
      <input id="q" placeholder="手机号 / 渠道">
      <select id="status"><option value="">全部状态</option></select>
      <select id="source"><option value="">全部来源</option></select>
      <select id="owner"><option value="">全部负责人</option></select>
      <button onclick="loadLeads()">筛选</button>
      <button onclick="resetFilters()">重置</button>
      <button onclick="openImport()">CSV 导入</button>
      <button class="primary" onclick="openCreate()">新增线索</button>
    </div>
    <div class="funnel" id="funnel"></div>
    <table><thead><tr><th>ID</th><th>手机号</th><th>来源 / 渠道</th><th>状态</th><th>评分</th><th>负责人</th><th class="hide-sm">最近跟进</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table>
  </section>
</main>
<dialog id="dialog"><div class="modal" id="modal"></div></dialog>
<script>
const LABEL={NEW:"新线索",PENDING_CALL:"待外呼",CONNECTED:"已接通",UNREACHED:"未接通",VALID:"有效",INVALID:"无效",PENDING_WECHAT:"待加微",WECHAT_ADDED:"已加微",MQL:"MQL",SQL:"SQL"};
let users=[],meta={},overdueOnly=false;
const qEl=document.getElementById("q"),statusEl=document.getElementById("status"),sourceEl=document.getElementById("source"),ownerEl=document.getElementById("owner");
const questionEl=document.getElementById("question"),answerEl=document.getElementById("answer"),actorEl=document.getElementById("actor");
async function api(path,opt){const r=await fetch(path,{headers:{"Content-Type":"application/json"},...opt});const d=await r.json();if(!r.ok)throw Error(d.error||"请求失败");return d}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function actorPayload(data={}){return {...data,actor_id:+actorEl.value}}
async function init(){[users,meta]=await Promise.all([api("/api/users"),api("/api/meta")]);const saved=localStorage.getItem("lead_actor_id");const defaultActor=users.find(u=>u.role==="manager")||users[0];for(const u of users){ownerEl.insertAdjacentHTML("beforeend",`<option value="${u.id}">${esc(u.name)}</option>`);actorEl.insertAdjacentHTML("beforeend",`<option value="${u.id}">${esc(u.name)} · ${u.role==="manager"?"主管":"销售"}</option>`)}actorEl.value=saved&&users.some(u=>String(u.id)===saved)?saved:defaultActor.id;actorEl.addEventListener("change",()=>localStorage.setItem("lead_actor_id",actorEl.value));for(const k of Object.keys(LABEL))statusEl.insertAdjacentHTML("beforeend",`<option value="${k}">${LABEL[k]}</option>`);for(const s of meta.sources)sourceEl.insertAdjacentHTML("beforeend",`<option>${esc(s)}</option>`);await Promise.all([loadFunnel(),loadLeads()])}
async function loadFunnel(){const d=await api("/api/funnel");const defs=[["总线索",d.total,"当前全部线索"],["有效率",d.valid_rate+"%","有效及后续 / 总线索"],["MQL 转化率",d.mql_rate+"%","MQL+SQL / 有效及后续"],["SQL 转化率",d.sql_rate+"%","SQL / MQL+SQL"],["超 48h 未跟进",d.overdue,"点击仅看超时线索"]];cards.innerHTML=defs.map((x,i)=>`<div class="card ${i===4?"clickable":""}" title="${x[2]}" ${i===4?'onclick="toggleOverdue()"':""}><span>${x[0]}</span><b>${x[1]}</b><small class="muted">${x[2]}</small></div>`).join("");const order=["NEW","PENDING_CALL","CONNECTED","VALID","PENDING_WECHAT","WECHAT_ADDED","MQL","SQL"];funnel.innerHTML=order.map((s,i)=>`${i?'<span class="arrow">→</span>':""}<span class="stage">${LABEL[s]} <b>${d.counts[s]||0}</b></span>`).join("")}
function fmtTime(s){if(!s)return "—";return new Intl.DateTimeFormat("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date(s))}
async function loadLeads(){const p=new URLSearchParams({q:qEl.value,status:statusEl.value,source:sourceEl.value,owner_id:ownerEl.value,overdue:overdueOnly?"1":""});const data=await api("/api/leads?"+p);rows.innerHTML=data.map(x=>`<tr><td>${x.id}</td><td>${esc(x.phone)}</td><td>${esc(x.source)}<br><span class="muted">${esc(x.channel)}</span></td><td><span class="status">${LABEL[x.status]}</span>${x.overdue?'<br><span class="overdue">跟进超时</span>':""}</td><td><b>${x.qualification?.score??0}</b><br><span class="muted">${esc(x.qualification?.level||"")}</span></td><td>${esc(x.owner_name||"未分配")}</td><td class="hide-sm">${fmtTime(x.last_follow_up_at)}</td><td><button onclick="detail(${x.id})">详情 / 操作</button></td></tr>`).join("")||'<tr><td colspan="8" class="muted">没有符合条件的线索</td></tr>'}
function toggleOverdue(){overdueOnly=!overdueOnly;loadLeads()}
function resetFilters(){qEl.value=statusEl.value=sourceEl.value=ownerEl.value="";overdueOnly=false;loadLeads()}
async function askQuestion(){try{const d=await api("/api/query",{method:"POST",body:JSON.stringify({question:questionEl.value})});const mode=d.agent?.mode==="llm"?"LLM Agent":"规则回退";const tools=(d.agent?.tool_calls||[]).map(x=>`${x.name} ${JSON.stringify(x.arguments||{})}`).join("、");const trace=(d.agent?.trace||[]).map(x=>`<li><b>${esc(x.step)}</b>：${esc(x.detail)}</li>`).join("");answerEl.innerHTML=`<b>${esc(d.answer)}</b><br><span class="muted">执行模式：${mode}${tools?` · 工具：${esc(tools)}`:""}</span>${d.definition?`<br>${esc(d.definition)}`:""}${d.data_boundary?`<br><span class="muted">数据边界：${esc(d.data_boundary)}</span>`:""}${trace?`<div class="tracebox"><b>Agent 执行链路</b><ol>${trace}</ol></div>`:""}${d.action?` <button onclick="toggleOverdue()">${esc(d.action.label)}</button>`:""}`}catch(e){answerEl.textContent=e.message}}
function show(html){modal.innerHTML=html;dialog.showModal()}
function closeDlg(){dialog.close()}
function openCreate(){show(`<h3>新增模拟线索</h3><div class="grid"><input id="cPhone" placeholder="11 位模拟手机号"><input id="cSource" placeholder="来源，如 信息流"><input id="cChannel" class="full" placeholder="渠道，如 抖音-暑期营"></div><p id="err" class="error"></p><button onclick="closeDlg()">取消</button> <button class="primary" onclick="createLead()">保存</button>`)}
function openImport(){show(`<h3>CSV 批量导入</h3><p class="hint">表头必须为 phone,source,channel；单次最多 500 条。手机号重复时保留原记录，不覆盖原归因。</p><div class="filebox"><input id="csvFile" type="file" accept=".csv,text/csv"></div><p id="result" class="muted"></p><p id="err" class="error"></p><button onclick="closeDlg()">关闭</button> <button class="primary" onclick="importCsv()">开始导入</button>`)}
async function importCsv(){try{const f=csvFile.files[0];if(!f)throw Error("请先选择 CSV 文件");const lines=(await f.text()).replace(/^\uFEFF/,"").trim().split(/\r?\n/);const heads=lines.shift().split(",").map(x=>x.trim());if(heads.join(",")!=="phone,source,channel")throw Error("CSV 表头必须为 phone,source,channel");const data=lines.filter(Boolean).map(line=>{const v=line.split(",").map(x=>x.trim());return {phone:v[0],source:v[1],channel:v[2]}});const d=await api("/api/import",{method:"POST",body:JSON.stringify(actorPayload({rows:data}))});result.textContent=`新增 ${d.created} 条，重复 ${d.duplicates} 条，错误 ${d.errors} 条`;await Promise.all([loadFunnel(),loadLeads()])}catch(e){err.textContent=e.message}}
async function createLead(){try{await api("/api/leads",{method:"POST",body:JSON.stringify(actorPayload({phone:cPhone.value,source:cSource.value,channel:cChannel.value}))});closeDlg();await Promise.all([loadFunnel(),loadLeads()])}catch(e){err.textContent=e.message}}
async function detail(id){
  const d=await api("/api/leads/"+id);
  const next=meta.transitions[d.status]||[];
  const q=d.qualification||{};
  const blockers=(q.blockers||[]).map(x=>`<span class="chip">${esc(x)}</span>`).join("");
  const breakdown=(q.breakdown||[]).map(x=>`<li>${esc(x.label)}：${x.points} 分，${esc(x.reason)}</li>`).join("");
  const audit=(d.audit_logs||[]).map(x=>`<div class="item"><b>${esc(x.action)}</b> · ${fmtTime(x.created_at)}<br><span class="muted">${esc(x.actor_name||"外部系统")}：${esc(x.detail)}</span></div>`).join("");
  show(`<h3>线索 #${id} · ${esc(d.phone)}</h3><p>${esc(d.source)} / ${esc(d.channel)} · <span class="status">${LABEL[d.status]}</span></p>
  <div class="scorebox">
    <div><span class="score">${q.score??0}</span> / 100 · ${esc(q.level||"待判断")} · <span class="${q.can_mql?'ok':'bad'}">${q.can_mql?'MQL 硬性准入已满足':'暂不可转 MQL'}</span></div>
    <p class="hint">${esc(q.summary||"")}</p>
    ${blockers?`<div class="chips">${blockers}</div>`:""}
    <details><summary>查看评分拆解</summary><ol>${breakdown}</ol></details>
  </div>
  <div class="grid"><select id="dOwner">${users.map(u=>`<option value="${u.id}" ${u.id==d.owner_id?"selected":""}>${esc(u.name)}</option>`).join("")}</select><button onclick="assign(${id})">分配负责人</button><textarea id="follow" class="full" placeholder="记录本次沟通结果与下一步动作"></textarea><button class="full" onclick="followUp(${id})">新增跟进记录</button><select id="nextStatus">${next.map(s=>`<option value="${s}">${LABEL[s]}</option>`).join("")||'<option value="">当前无后续状态</option>'}</select><input id="reason" placeholder="无效原因 / 商机说明 / 变更备注"><p class="full hint">MQL：须已分配负责人且至少有一次跟进；SQL：必须由 MQL 转化并填写明确商机说明。销售只能操作自己负责的线索，重新打开无效线索需主管处理。</p><button class="full primary" onclick="changeStatus(${id})">提交状态变更</button></div><p id="err" class="error"></p><h4>跟进记录</h4><div class="timeline">${d.follow_ups.map(x=>`<div class="item"><b>${esc(x.operator_name)}</b> · ${fmtTime(x.created_at)}<br>${esc(x.content)}</div>`).join("")||'<span class="muted">暂无</span>'}</div><h4>状态历史</h4><div class="timeline">${d.history.map(x=>`<div class="item">${x.from_status?LABEL[x.from_status]+" → ":""}<b>${LABEL[x.to_status]}</b> · ${fmtTime(x.changed_at)}<br><span class="muted">${esc(x.note||"")}</span></div>`).join("")}</div><h4>审计记录</h4><div class="timeline">${audit||'<span class="muted">暂无审计记录</span>'}</div><p><button onclick="closeDlg()">关闭</button></p>`)
}
async function assign(id){try{await api(`/api/leads/${id}/assign`,{method:"POST",body:JSON.stringify(actorPayload({owner_id:+dOwner.value}))});await detail(id);loadLeads()}catch(e){err.textContent=e.message}}
async function followUp(id){try{await api(`/api/leads/${id}/follow-ups`,{method:"POST",body:JSON.stringify(actorPayload({content:follow.value}))});await detail(id);loadLeads();loadFunnel()}catch(e){err.textContent=e.message}}
async function changeStatus(id){try{const s=nextStatus.value;await api(`/api/leads/${id}/status`,{method:"POST",body:JSON.stringify(actorPayload({status:s,note:reason.value,invalid_reason:s==="INVALID"?reason.value:null,opportunity_note:s==="SQL"?reason.value:null}))});await detail(id);loadLeads();loadFunnel()}catch(e){err.textContent=e.message}}
dialog.addEventListener("click",e=>{if(e.target===dialog)closeDlg()});qEl.addEventListener("keydown",e=>{if(e.key==="Enter")loadLeads()});questionEl.addEventListener("keydown",e=>{if(e.key==="Enter")askQuestion()});init();
</script>
</body></html>
